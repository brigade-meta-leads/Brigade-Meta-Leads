name: Brigade Leads Sync

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to commit .pushed_ids.json back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
          MS_REFRESH_TOKEN: ${{ secrets.MS_REFRESH_TOKEN }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_FILE_ID: ${{ secrets.MS_FILE_ID }}
        run: python -u sync.py

      - name: Save pushed IDs back to repo
        run: |
          git config user.name  "brigade-sync-bot"
          git config user.email "sync-bot@brigade"
          git add .pushed_ids.json
          git diff --staged --quiet || git commit -m "sync: update pushed lead IDs [skip ci]"
          git push
