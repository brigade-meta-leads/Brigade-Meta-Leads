name: Brigade Leads Sync

on:
  schedule:
    - cron: '*/20 4-15 * * *'   # every 20 min, 9:30 AM–9:30 PM IST (4–15 UTC)
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard
        env:
          META_SYSTEM_USER_TOKEN: ${{ secrets.META_SYSTEM_USER_TOKEN }}
        run: python -u generate_dashboard.py

      - name: Commit updated files
        run: |
          git config user.name  "brigade-sync-bot"
          git config user.email "sync-bot@brigade"
          git add dashboard.html
          git diff --staged --quiet || git commit -m "sync: update leads [skip ci]"
          git push
